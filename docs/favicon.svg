<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lens-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C147E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg-gradient)"/>
  
  <!-- Camera Body -->
  <rect x="15" y="25" width="70" height="55" rx="8" fill="white" opacity="0.95"/>
  
  <!-- Camera Lens -->
  <circle cx="50" cy="52" r="18" fill="url(#lens-gradient)"/>
  <circle cx="50" cy="52" r="12" fill="white" opacity="0.3"/>
  <circle cx="50" cy="52" r="6" fill="white" opacity="0.5"/>
  
  <!-- Flash -->
  <circle cx="75" cy="35" r="4" fill="#FFD700"/>
  
  <!-- Film Strip Holes (left) -->
  <rect x="12" y="22" width="5" height="5" rx="1" fill="white"/>
  <rect x="12" y="43" width="5" height="5" rx="1" fill="white"/>
  <rect x="12" y="64" width="5" height="5" rx="1" fill="white"/>
  <rect x="12" y="73" width="5" height="5" rx="1" fill="white"/>
  
  <!-- Film Strip Holes (right) -->
  <rect x="83" y="22" width="5" height="5" rx="1" fill="white"/>
  <rect x="83" y="43" width="5" height="5" rx="1" fill="white"/>
  <rect x="83" y="64" width="5" height="5" rx="1" fill="white"/>
  <rect x="83" y="73" width="5" height="5" rx="1" fill="white"/>
  
  <!-- Shutter Button -->
  <rect x="66" y="65" width="12" height="8" rx="2" fill="#FF6B9D"/>
</svg>
